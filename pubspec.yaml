name: viralflow_automation
description: AI-Powered Viral Content Creator Platform - Generate, Schedule & Monetize Social Media Content
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0

  # AI & Content
  dart_openai: ^5.1.0
  http: ^1.2.1

  # Social Media & Sharing
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Storage & Cache
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
